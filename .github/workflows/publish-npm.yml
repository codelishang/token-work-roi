name: publish-npm

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish token-work to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm test

      - run: node src/cli.mjs privacy-check --include-untracked

      - run: npm run build

      - run: npm run privacy:check

      - run: npm audit --audit-level=low

      - run: npm run smoke:npx

      - uses: browser-actions/setup-chrome@v1

      - run: npm run smoke:browser

      - run: npm run desktop:smoke

      - run: npm pack --dry-run

      - run: git diff --check

      - run: npm publish --provenance --access public
