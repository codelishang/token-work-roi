name: Desktop Pulse Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop-smoke:
    name: Desktop smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        node: [24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run privacy:check
      - run: node src/cli.mjs privacy-check --include-untracked
      - run: npm run desktop:smoke
